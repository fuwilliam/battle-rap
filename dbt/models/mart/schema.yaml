version: 2

models:
  - name: rappers
    description: "Contains artists' Spotify data (monthly_listeners, followers, world_rank, seeds)"
    columns:
      - name: artist_id
        description: "Spotify's artist_id identifier"
        tests:
          - unique
          - not_null
      - name: artist_name
        description: "The artist's name"
        tests:
          - not_null
      - name: monthly_listeners
        description: "Artist's Spotify monthly listener count (replaces the old 0-100 popularity). Nullable at this layer."
      - name: followers
        description: "Artist's follower count"
        tests:
          - not_null
      - name: world_rank
        description: "Artist's global Spotify rank (0 if outside the tracked top set)"
      - name: seeds
        description: "Comma-separated discovery seeds (genres/playlists) that surfaced the artist"
      - name: flag_core_genre
        description: "True if the artist was surfaced by a core hip-hop seed"
        tests:
          - not_null
      - name: image_url
        description: "URL for the artist's profile picture on Spotify"
      - name: load_date
        description: "Timestamp for when the record was initially loaded to Postgres"
        tests:
          - not_null

  - name: top_tracks
    description: "Contains up to top 10 tracks associated with given artist"
    columns:
      - name: artist_id
        description: "Spotify's artist_id identifier"
        tests:
          - not_null
          - relationships:
              to: ref('rappers')
              field: artist_id
      - name: track_rank
        description: "Rank for the track. A record with track_rank = 2 means it is the artist's second top track."
        tests:
          - not_null
      - name: track_name
        description: "The track (song) name"
        tests:
          - not_null
      - name: track_id
        description: "Spotify's track_id identifier"
        tests:
          - not_null
      - name: track_url
        description: "URL to play the track on Spotify"
        tests:
          - not_null
      - name: playcount
        description: "Spotify play count for the track"
      - name: load_date
        description: "Timestamp for when the record was initially loaded to Postgres"
        tests:
          - not_null

  - name: rappers_filtered
    description: "Artists filtered by monthly_listeners, core-genre seed and followers"
    columns:
      - name: artist_id
        description: "Spotify's artist_id identifier"
        tests:
          - unique
          - not_null
      - name: artist_name
        description: "The artist's name"
        tests:
          - not_null
      - name: monthly_listeners
        description: "Artist's Spotify monthly listener count"
        tests:
          - not_null
      - name: followers
        description: "Artist's follower count"
        tests:
          - not_null
      - name: world_rank
        description: "Artist's global Spotify rank (0 if outside the tracked top set)"
      - name: seeds
        description: "Comma-separated discovery seeds that surfaced the artist"
      - name: image_url
        description: "URL for the artist's profile picture on Spotify"
      - name: load_date
        description: "Timestamp for when the record was initially loaded to Postgres"
        tests:
          - not_null

  - name: standings
    description: "Simple win/loss compilation for the artists battling"
    columns:
      - name: artist_id
        description: "Spotify's artist_id identifier"
        tests:
          - unique
          - not_null
      - name: artist_name
        description: "The artist's name"
        tests:
          - not_null
      - name: wins
        description: "Sum of matchups won by artist"
        tests:
          - not_null
      - name: losses
        description: "Sum of matchups lost by artist"
        tests:
          - not_null
      - name: win_rate
        description: "Wins divided by (wins+losses)"
        tests:
          - not_null
