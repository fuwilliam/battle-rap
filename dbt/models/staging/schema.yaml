version: 2

sources:
  - name: raw
    description: "Sourced from Spotify (via spotapi) > Postgres (Supabase) > GCS > BQ"
    tables:
      - name: rappers
      - name: top_tracks
      - name: results

models:
  - name: stg_rappers
    description: "Basically casting load_date to proper timestamp format"
    columns:
      - name: artist_id
        description: "Spotify's artist_id identifier"
        tests:
          - unique
          - not_null
      - name: artist_name
        description: "The artist's name"
        tests:
          - not_null
      - name: monthly_listeners
        description: "Artist's Spotify monthly listener count (replaces the old 0-100 popularity)"
        tests:
          - not_null
      - name: followers
        description: "Artist's follower count"
        tests:
          - not_null
      - name: world_rank
        description: "Artist's global Spotify rank (0 if outside the tracked top set)"
      - name: seeds
        description: "Comma-separated discovery seeds (genres/playlists) that surfaced the artist"
      - name: flag_core_genre
        description: "True if the artist was surfaced by a core hip-hop seed"
        tests:
          - not_null
      - name: image_url
        description: "URL for the artist's profile picture on Spotify"
      - name: load_date
        description: "Timestamp for when the record was initially loaded to Postgres"
        tests:
          - not_null

  - name: stg_top_tracks
    description: "Basically casting load_date to proper timestamp format"
    columns:
      - name: artist_id
        description: "Spotify's artist_id identifier"
        tests:
          - not_null
      - name: track_rank
        description: "Rank for the track. A record with track_rank = 2 means it is the artist's second top track."
        tests:
          - not_null
      - name: track_name
        description: "The track (song) name"
        tests:
          - not_null
      - name: track_id
        description: "Spotify's track_id identifier"
        tests:
          - not_null
      - name: track_url
        description: "URL to play the track on Spotify"
        tests:
          - not_null
      - name: playcount
        description: "Spotify play count for the track"
      - name: load_date
        description: "Timestamp for when the record was initially loaded to Postgres"
        tests:
          - not_null

  - name: stg_results
    description: "Basically casting voted_at to proper timestamp format"
    columns:
      - name: matchup_id
        description: "UUID for each matchup voted at battlerap.app"
        tests:
          - unique
          - not_null
      - name: winner_id
        description: "artist_id of the winner of the matchup"
        tests:
          - not_null
      - name: loser_id
        description: "artist_id of the loser of the matchup"
        tests:
          - not_null
      - name: voted_at
        description: "Timestamp of when the matchup occurred"
        tests:
          - not_null
